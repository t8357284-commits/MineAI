version: '3.9'

# ─── SocialPulse AI — Production Docker Compose ───────────────────────────────
#
# Services:
#   postgres  — PostgreSQL 16 (persistent data volume)
#   app       — Node.js 20 (serves API + frontend static files)
#   nginx     — Reverse proxy + TLS termination (pure proxy, no fs mounts)
#   certbot   — Let's Encrypt certificate issuance & auto-renewal
#
# First deploy:
#   1. cp .env.example .env  &&  nano .env
#   2. chmod +x scripts/init-ssl.sh && ./scripts/init-ssl.sh
#   3. docker compose up -d
#
# Updates:
#   ./scripts/deploy.sh

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: socialpulse_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-socialpulse}
      POSTGRES_USER:     ${POSTGRES_USER:-socialpulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - socialpulse_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-socialpulse} -d ${POSTGRES_DB:-socialpulse}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Node.js Application ──────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: socialpulse_app
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT:     "3000"
      # Override DATABASE_URL to use the internal Docker hostname "postgres"
      DATABASE_URL: postgresql://${POSTGRES_USER:-socialpulse}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-socialpulse}?schema=public
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - socialpulse_net
    # Note: port 3000 is NOT exposed to the host — Nginx proxies to it internally.
    # Expose only for local debugging: uncomment the two lines below if needed.
    # ports:
    #   - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Nginx Reverse Proxy ──────────────────────────────────────────────────────
  #
  # nginx:alpine has NO access to the Node.js filesystem.
  # Frontend files are served by Node.js (express.static + SPA fallback).
  # Nginx only terminates TLS and proxies all traffic to app:3000.
  nginx:
    image: nginx:alpine
    container_name: socialpulse_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # certbot volumes — ACME challenge webroot + certificates
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - socialpulse_net

  # ── Certbot (Let's Encrypt SSL) ──────────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: socialpulse_certbot
    restart: unless-stopped
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    # Check every 12 h; certbot only renews when < 30 days remain
    entrypoint: >
      /bin/sh -c "
        trap exit TERM;
        while :; do
          certbot renew --webroot -w /var/www/certbot --quiet;
          sleep 12h & wait $${!};
        done
      "

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  postgres_data:   # PostgreSQL data (persistent)
  uploads_data:    # User-uploaded files (local fallback when Cloudinary not set)
  certbot_www:     # Let's Encrypt ACME challenge files
  certbot_certs:   # Let's Encrypt certificates

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  socialpulse_net:
    driver: bridge
