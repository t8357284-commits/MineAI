# ─── SocialPulse AI — Nginx Reverse Proxy ─────────────────────────────────────
#
# Architecture decision:
#   Node.js (app:3000) serves BOTH the static frontend AND the API.
#   Nginx acts as a pure TLS-terminating reverse proxy — it never reads the
#   filesystem for frontend files.  This eliminates the mount-path mismatch
#   that caused blank pages and 404s.
#
# What Nginx handles:
#   • HTTP → HTTPS redirect (port 80)
#   • Let's Encrypt ACME challenge (/.well-known/acme-challenge/)
#   • TLS termination (port 443)
#   • Rate limiting on auth / AI / general API
#   • Security response headers
#   • Proxy_pass everything else → http://app:3000
#
# What Node.js handles:
#   • Static frontend files  (/frontend/public via express.static)
#   • SPA fallback (app.get('*') → index.html)
#   • All /api/* routes
#
# Before first deploy, run: ./scripts/init-ssl.sh
# That script replaces DOMAIN_PLACEHOLDER with your actual domain.

worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    # ── Basic settings ─────────────────────────────────────────────────────────
    charset              utf-8;
    sendfile             on;
    tcp_nopush           on;
    tcp_nodelay          on;
    server_tokens        off;
    log_not_found        off;
    types_hash_max_size  2048;
    keepalive_timeout    65;

    # Allow up to 26 MB request bodies (media uploads go through Node.js)
    client_max_body_size 26m;

    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ────────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    '$request_time';
    access_log /var/log/nginx/access.log main buffer=16k;
    error_log  /var/log/nginx/error.log warn;

    # ── Gzip ───────────────────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   256;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/rss+xml image/svg+xml font/woff2;

    # ── Rate-limiting zones ────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=auth:10m  rate=10r/m;
    limit_req_zone $binary_remote_addr zone=ai:10m    rate=10r/m;
    limit_req_zone $binary_remote_addr zone=api:10m   rate=60r/m;

    # ── Upstream — Node.js app ─────────────────────────────────────────────────
    upstream node_app {
        server app:3000;
        keepalive 32;
    }

    # ── Common proxy headers (defined once, used via block copy below) ─────────
    # Note: nginx:alpine does not include /etc/nginx/proxy_params by default
    # and we do not mount an external proxy_params.conf.
    # All headers are inlined inside each proxy location block.

    # ══════════════════════════════════════════════════════════════════════════
    # SERVER 1 — HTTP  (port 80)
    # ══════════════════════════════════════════════════════════════════════════
    server {
        listen      80;
        listen      [::]:80;
        server_name _;

        # Let's Encrypt ACME challenge (certbot writes here via volume)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Everything else → HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ══════════════════════════════════════════════════════════════════════════
    # SERVER 2 — HTTPS (port 443)
    # ══════════════════════════════════════════════════════════════════════════
    server {
        listen      443 ssl http2;
        listen      [::]:443 ssl http2;
        server_name DOMAIN_PLACEHOLDER www.DOMAIN_PLACEHOLDER;

        # ── TLS certificates (issued by certbot, renewed automatically) ────────
        ssl_certificate      /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/fullchain.pem;
        ssl_certificate_key  /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/privkey.pem;
        ssl_trusted_certificate /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/chain.pem;

        ssl_protocols             TLSv1.2 TLSv1.3;
        ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;
        ssl_session_cache         shared:SSL:10m;
        ssl_session_timeout       1d;
        ssl_session_tickets       off;

        # OCSP Stapling
        ssl_stapling        on;
        ssl_stapling_verify on;
        resolver 1.1.1.1 8.8.8.8 valid=300s;
        resolver_timeout 5s;

        # ── Security headers ───────────────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options           "SAMEORIGIN"    always;
        add_header X-Content-Type-Options    "nosniff"       always;
        add_header X-XSS-Protection          "1; mode=block" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

        # ── /api/auth/* — strict rate limit ───────────────────────────────────
        location /api/auth/ {
            limit_req zone=auth burst=5 nodelay;

            proxy_pass         http://node_app;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # ── /api/ai/* — AI rate limit, longer timeout ─────────────────────────
        location /api/ai/ {
            limit_req zone=ai burst=3 nodelay;

            proxy_pass         http://node_app;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        # ── /api/* — general API ──────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass         http://node_app;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # ── Everything else (frontend SPA + static assets) ────────────────────
        # Node.js serves express.static + SPA fallback (index.html).
        # No filesystem access needed from the nginx container.
        location / {
            proxy_pass         http://node_app;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_connect_timeout 10s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }
    }
}
